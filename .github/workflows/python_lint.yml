name: Python Lint Workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '22 3 * * 4'
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        linter: ['pylint', 'ruff', 'mypy', 'pytype', 'pyright', 'fixit']
      fail-fast: false
    steps:
      # install dependencies for this project, then run the linter, so we don't get import failures when the linters scan the code
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pip dependencies
        run: |
          python3 -mpip install -q --upgrade pip
          python3 -mpip install -q flake8
      - name: Run Python Lint
        uses: advanced-security/python-lint-code-scanning-action@7ebf81c5860ee4d41849872bc2f95b4243c8dc28 # v1.1.3
        with:
          linter: ${{ matrix.linter }}
          python-version: "3.13"
